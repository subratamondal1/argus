name: CI

# Green from commit 1. Lint + type-check + tests run on every push and PR.
# The eval-regression gate (Phase 3) and the kind-in-CI manifest smoke test
# (Phase 4) get added to this same workflow as the project grows.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --frozen --all-groups

      - name: Lint (ruff)
        run: uv run ruff check .

      - name: Format check (ruff)
        run: uv run ruff format --check .

      - name: Type-check (ty)
        run: uv run ty check

      - name: Tests (pytest)
        run: uv run pytest
