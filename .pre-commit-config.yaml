# Local guard rails before code leaves the laptop. Install once:
#   uv run pre-commit install
# CI runs gitleaks too (see .github/workflows/ci.yml), so a key can't reach
# public git history even if the hook isn't installed. Keep revs current with
#   uv run pre-commit autoupdate
repos:
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.9.6
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format
