# Minimal SearXNG config for Argus: inherit the upstream defaults, enable the
# JSON output format the web_search tool needs, and disable the rate limiter for
# local development. Change the secret_key for any non-local deployment.
use_default_settings: true

server:
  secret_key: "argus-dev-change-me-in-prod"
  limiter: false

search:
  formats:
    - html
    - json
