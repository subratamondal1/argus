# Local backing services for Argus. Phase 0 needs only SearXNG (the search tool's
# backend). The host port comes from ARGUS_SEARXNG_PORT (default 8080); `make up`
# selects the first free port and writes it to .env so the app and the container
# agree on one port. Phase 1+ add the OTel collector + Grafana/Tempo; Phase 2 adds
# NATS + Redis + Postgres.

services:
  searxng:
    image: searxng/searxng:latest
    container_name: argus-searxng
    ports:
      - "${ARGUS_SEARXNG_PORT:-8080}:8080"
    volumes:
      - ./searxng:/etc/searxng:rw
    environment:
      - SEARXNG_BASE_URL=http://localhost:${ARGUS_SEARXNG_PORT:-8080}/
    restart: unless-stopped

  postgres:
    image: pgvector/pgvector:pg18
    container_name: argus-postgres
    profiles: ["data"]
    environment:
      POSTGRES_USER: argus
      POSTGRES_PASSWORD: argus
      POSTGRES_DB: argus
    ports:
      - "${ARGUS_POSTGRES_PORT:-5432}:5432"
    volumes:
      - argus-pgdata:/var/lib/postgresql/data
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U argus -d argus"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

volumes:
  argus-pgdata:
